<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Homelab monitoring stack architecture</title>
  <desc>Data flow from exporters to Prometheus to Grafana, with Alertmanager routing to n8n, and Uptime Kuma for uptime checks</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Server boundary -->
  <rect x="20" y="20" width="490" height="480" rx="16" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text class="ts" x="36" y="44" fill="#888780">Ubuntu home server · 192.168.0.10</text>

  <!-- Exporters column (left) -->
  <g class="c-teal">
    <rect x="48" y="68" width="130" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="113" y="87" text-anchor="middle" dominant-baseline="central">Node Exporter</text>
    <text class="ts" x="113" y="103" text-anchor="middle" dominant-baseline="central">:9100 · host metrics</text>
  </g>

  <g class="c-teal">
    <rect x="48" y="130" width="130" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="113" y="149" text-anchor="middle" dominant-baseline="central">cAdvisor</text>
    <text class="ts" x="113" y="165" text-anchor="middle" dominant-baseline="central">:8080 · container metrics</text>
  </g>

  <!-- Prometheus (centre) -->
  <g class="c-coral">
    <rect x="240" y="100" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="315" y="122" text-anchor="middle" dominant-baseline="central">Prometheus</text>
    <text class="ts" x="315" y="140" text-anchor="middle" dominant-baseline="central">:9090 · metrics store</text>
  </g>

  <!-- Scrape arrows -->
  <line x1="178" y1="90" x2="238" y2="118" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="178" y1="152" x2="238" y2="138" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="200" y="118" text-anchor="middle" fill="#1D9E75">scrapes</text>

  <!-- Grafana -->
  <g class="c-amber">
    <rect x="240" y="220" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="315" y="242" text-anchor="middle" dominant-baseline="central">Grafana</text>
    <text class="ts" x="315" y="258" text-anchor="middle" dominant-baseline="central">:3030 · dashboards</text>
  </g>

  <!-- Prometheus → Grafana -->
  <line x1="315" y1="156" x2="315" y2="218" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="330" y="192" fill="#BA7517">queries</text>

  <!-- Alertmanager -->
  <g class="c-purple">
    <rect x="48" y="310" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="123" y="332" text-anchor="middle" dominant-baseline="central">Alertmanager</text>
    <text class="ts" x="123" y="348" text-anchor="middle" dominant-baseline="central">:9093 · routing</text>
  </g>

  <!-- Prometheus → Alertmanager -->
  <path d="M270 156 L270 200 L123 200 L123 308" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="186" y="195" fill="#534AB7">fires alerts</text>

  <!-- Uptime Kuma -->
  <g class="c-blue">
    <rect x="240" y="360" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="315" y="382" text-anchor="middle" dominant-baseline="central">Uptime Kuma</text>
    <text class="ts" x="315" y="398" text-anchor="middle" dominant-baseline="central">:3001 · uptime checks</text>
  </g>

  <!-- Authentik -->
  <g class="c-gray">
    <rect x="48" y="420" width="150" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="123" y="439" text-anchor="middle" dominant-baseline="central">Authentik</text>
    <text class="ts" x="123" y="455" text-anchor="middle" dominant-baseline="central">:9001 · SSO</text>
  </g>

  <!-- External: Browser -->
  <g class="c-gray">
    <rect x="560" y="220" width="104" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="612" y="239" text-anchor="middle" dominant-baseline="central">Browser</text>
    <text class="ts" x="612" y="255" text-anchor="middle" dominant-baseline="central">LAN access</text>
  </g>

  <!-- Browser → Grafana -->
  <line x1="560" y1="242" x2="392" y2="248" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- External: n8n + notifications -->
  <g class="c-green">
    <rect x="560" y="310" width="104" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="612" y="329" text-anchor="middle" dominant-baseline="central">n8n</text>
    <text class="ts" x="612" y="345" text-anchor="middle" dominant-baseline="central">:5678 · workflows</text>
  </g>

  <!-- Alertmanager → n8n -->
  <line x1="198" y1="338" x2="558" y2="332" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="380" y="326" text-anchor="middle" fill="#534AB7">webhook</text>

  <!-- n8n → notifications -->
  <g class="c-green">
    <rect x="560" y="380" width="104" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="612" y="399" text-anchor="middle" dominant-baseline="central">Slack / email</text>
    <text class="ts" x="612" y="415" text-anchor="middle" dominant-baseline="central">notifications</text>
  </g>

  <line x1="612" y1="354" x2="612" y2="378" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>

</svg>
